openapi: 3.1.0
info:
  title: BakeMaster Pro API
  description: API para gestão de padaria — produtos, vendas, usuários e autenticação com RBAC.
  version: 1.0.0
  contact:
    name: BakeMaster Pro

servers:
  - url: http://localhost:3000
    description: Desenvolvimento local

tags:
  - name: Auth
    description: Autenticação e sessão
  - name: Users
    description: Gestão de usuários e permissões (IAM)
  - name: Products
    description: Cadastro e controle de cardápio
  - name: Sales
    description: Fluxo de caixa e transações
  - name: Dashboard
    description: Resumo gerencial

security:
  - BearerAuth: []

paths:
  # ── Auth ──────────────────────────────────────────────
  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Autenticar usuário
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginBody'
      responses:
        '200':
          description: Login bem-sucedido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciais inválidas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Usuário inativo
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Renovar access token
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Token renovado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshResponse'
        '401':
          description: Refresh token inválido
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Encerrar sessão
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '204':
          description: Sessão encerrada

  /api/v1/auth/me:
    get:
      tags: [Auth]
      summary: Obter usuário autenticado
      responses:
        '200':
          description: Dados do usuário
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          description: Não autenticado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Users ─────────────────────────────────────────────
  /api/v1/users:
    get:
      tags: [Users]
      summary: Listar usuários
      parameters:
        - name: role
          in: query
          schema:
            $ref: '#/components/schemas/UserRole'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/UserStatus'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Lista de usuários
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'

    post:
      tags: [Users]
      summary: Criar usuário
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserBody'
      responses:
        '201':
          description: Usuário criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/{userId}:
    patch:
      tags: [Users]
      summary: Atualizar usuário
      parameters:
        - $ref: '#/components/parameters/UserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserBody'
      responses:
        '200':
          description: Usuário atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Users]
      summary: Remover usuário
      parameters:
        - $ref: '#/components/parameters/UserId'
      responses:
        '204':
          description: Usuário removido
        '404':
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/users/permissions:
    get:
      tags: [Users]
      summary: Obter matriz de permissões por perfil
      parameters:
        - name: role
          in: query
          required: true
          schema:
            $ref: '#/components/schemas/UserRole'
      responses:
        '200':
          description: Lista de permissões do perfil
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Permission'

  # ── Products ──────────────────────────────────────────
  /api/v1/products:
    get:
      tags: [Products]
      summary: Listar produtos
      parameters:
        - name: belowMinStock
          in: query
          description: Filtrar apenas produtos abaixo do estoque mínimo
          schema:
            type: boolean
        - name: category
          in: query
          schema:
            $ref: '#/components/schemas/ProductCategory'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Lista de produtos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

    post:
      tags: [Products]
      summary: Criar produto
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductBody'
      responses:
        '201':
          description: Produto criado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/products/{productId}:
    patch:
      tags: [Products]
      summary: Atualizar produto
      parameters:
        - $ref: '#/components/parameters/ProductId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductBody'
      responses:
        '200':
          description: Produto atualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'
        '404':
          description: Produto não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    delete:
      tags: [Products]
      summary: Remover produto
      parameters:
        - $ref: '#/components/parameters/ProductId'
      responses:
        '204':
          description: Produto removido
        '404':
          description: Produto não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ── Sales ─────────────────────────────────────────────
  /api/v1/sales:
    get:
      tags: [Sales]
      summary: Listar vendas
      parameters:
        - name: period
          in: query
          description: Período de filtragem
          schema:
            type: string
            enum: [today, week, month]
        - name: paymentMethod
          in: query
          schema:
            $ref: '#/components/schemas/PaymentMethod'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/SaleStatus'
        - name: sort
          in: query
          description: 'Campo de ordenação (prefixo `-` para decrescente)'
          schema:
            type: string
            example: '-createdAt'
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Lista de vendas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Sale'

    post:
      tags: [Sales]
      summary: Registrar venda
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSaleBody'
      responses:
        '201':
          description: Venda registrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Sale'
        '400':
          description: Dados inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/v1/sales/summary:
    get:
      tags: [Sales]
      summary: Resumo de vendas por período
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month]
            default: today
      responses:
        '200':
          description: Resumo de vendas
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SalesSummary'

  /api/v1/sales/stats/payment-methods:
    get:
      tags: [Sales]
      summary: Estatísticas por forma de pagamento
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [today, week, month]
            default: today
      responses:
        '200':
          description: Estatísticas de pagamento
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PaymentMethodStat'

  /api/v1/sales/trend:
    get:
      tags: [Sales]
      summary: Tendência de vendas ao longo do tempo
      parameters:
        - name: period
          in: query
          description: 'Janela de tempo (ex: 7d, 30d)'
          schema:
            type: string
            default: '7d'
      responses:
        '200':
          description: Série temporal de vendas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SalesTrendItem'

  # ── Dashboard ─────────────────────────────────────────
  /api/v1/dashboard/summary:
    get:
      tags: [Dashboard]
      summary: Resumo gerencial do dashboard
      responses:
        '200':
          description: Dados resumidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DashboardSummary'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    Limit:
      name: limit
      in: query
      description: Quantidade máxima de itens
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 50

    Offset:
      name: offset
      in: query
      description: Deslocamento para paginação
      schema:
        type: integer
        minimum: 0
        default: 0

    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        example: user_01

    ProductId:
      name: productId
      in: path
      required: true
      schema:
        type: string
        example: prod_01

  schemas:
    # ── Enums ───────────────────────────────────────────
    UserRole:
      type: string
      enum: [admin, manager, attendant]

    UserStatus:
      type: string
      enum: [active, inactive]

    ProductCategory:
      type: string
      enum: [bread, pastry, beverage]

    PaymentMethod:
      type: string
      enum: [cash, credit, debit, pix]

    SaleStatus:
      type: string
      enum: [preparing, ready_for_pickup, completed]

    OrderType:
      type: string
      enum: [counter, table]

    # ── Auth ────────────────────────────────────────────
    LoginBody:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
          example: joao@bakemaster.com
        password:
          type: string
          format: password
          example: '123456'

    LoginResponse:
      type: object
      required: [accessToken, refreshToken, expiresIn, user]
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        expiresIn:
          type: integer
          description: Tempo de vida do access token em segundos
          example: 900
        user:
          $ref: '#/components/schemas/User'

    RefreshResponse:
      type: object
      required: [accessToken, expiresIn]
      properties:
        accessToken:
          type: string
        expiresIn:
          type: integer
          example: 900

    # ── User ────────────────────────────────────────────
    User:
      type: object
      required: [id, name, email, role, status, lastAccessAt]
      properties:
        id:
          type: string
          example: user_01
        name:
          type: string
          example: João Silva
        email:
          type: string
          format: email
          example: joao@bakemaster.com
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          $ref: '#/components/schemas/UserStatus'
        lastAccessAt:
          type: string
          format: date-time

    CreateUserBody:
      type: object
      required: [name, email, role]
      properties:
        name:
          type: string
          example: Maria Santos
        email:
          type: string
          format: email
          example: maria@bakemaster.com
        role:
          $ref: '#/components/schemas/UserRole'

    UpdateUserBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/UserRole'
        status:
          $ref: '#/components/schemas/UserStatus'

    Permission:
      type: object
      required: [module, view, create, edit, delete]
      properties:
        module:
          type: string
          example: Produtos
        view:
          type: boolean
        create:
          type: boolean
        edit:
          type: boolean
        delete:
          type: boolean

    # ── Product ─────────────────────────────────────────
    Product:
      type: object
      required: [id, name, category, basePriceInCents, promoActive, stock, minStock, isCombo]
      properties:
        id:
          type: string
          example: prod_01
        name:
          type: string
          example: Pão Francês
        category:
          $ref: '#/components/schemas/ProductCategory'
        basePriceInCents:
          type: integer
          description: Preço base em centavos
          example: 80
        promoPriceInCents:
          type: integer
          nullable: true
          description: Preço promocional em centavos
          example: 70
        promoActive:
          type: boolean
        stock:
          type: integer
          example: 150
        minStock:
          type: integer
          example: 100
        isCombo:
          type: boolean

    CreateProductBody:
      type: object
      required: [name, category, basePriceInCents, promoActive, stock, minStock, isCombo]
      properties:
        name:
          type: string
        category:
          $ref: '#/components/schemas/ProductCategory'
        basePriceInCents:
          type: integer
        promoPriceInCents:
          type: integer
          nullable: true
        promoActive:
          type: boolean
        stock:
          type: integer
        minStock:
          type: integer
        isCombo:
          type: boolean

    UpdateProductBody:
      type: object
      properties:
        name:
          type: string
        category:
          $ref: '#/components/schemas/ProductCategory'
        basePriceInCents:
          type: integer
        promoPriceInCents:
          type: integer
          nullable: true
        promoActive:
          type: boolean
        stock:
          type: integer
        minStock:
          type: integer
        isCombo:
          type: boolean

    # ── Sale ────────────────────────────────────────────
    SaleItem:
      type: object
      required: [productId, name, quantity, unitPriceInCents]
      properties:
        productId:
          type: string
          example: prod_01
        name:
          type: string
          example: Pão Francês
        quantity:
          type: integer
          example: 10
        unitPriceInCents:
          type: integer
          example: 80

    Sale:
      type: object
      required: [id, createdAt, customer, items, totalInCents, paymentMethod, status, attendantId, attendantName]
      properties:
        id:
          type: string
          example: sale_001
        createdAt:
          type: string
          format: date-time
        customer:
          type: string
          example: Cliente Balcão
        items:
          type: array
          items:
            $ref: '#/components/schemas/SaleItem'
        totalInCents:
          type: integer
          example: 2850
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        status:
          $ref: '#/components/schemas/SaleStatus'
        attendantId:
          type: string
          example: user_03
        attendantName:
          type: string
          description: Campo computado — derivado de attendantId no backend
          example: Carlos Oliveira

    CreateSaleItem:
      type: object
      required: [productId, quantity, discountInCents]
      properties:
        productId:
          type: string
        quantity:
          type: integer
          minimum: 1
        discountInCents:
          type: integer
          minimum: 0
          description: Desconto por item em centavos

    CreateSaleBody:
      type: object
      required: [items, paymentMethod, orderType, globalDiscountInCents, totalInCents]
      properties:
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/CreateSaleItem'
        paymentMethod:
          $ref: '#/components/schemas/PaymentMethod'
        orderType:
          $ref: '#/components/schemas/OrderType'
        tableNumber:
          type: string
          description: Obrigatório quando orderType é "table"
        globalDiscountInCents:
          type: integer
          minimum: 0
          description: Desconto global sobre a venda em centavos
        totalInCents:
          type: integer
          description: Informativo — o backend DEVE recalcular a partir dos items. Usado para validação/reconciliação no client.

    SalesSummary:
      type: object
      required: [totalInCents, transactionCount, averageTicketInCents, pendingCount]
      properties:
        totalInCents:
          type: integer
        transactionCount:
          type: integer
        averageTicketInCents:
          type: integer
        pendingCount:
          type: integer
          description: Pedidos em preparo ou aguardando retirada

    PaymentMethodStat:
      type: object
      required: [method, totalInCents, transactionCount]
      properties:
        method:
          $ref: '#/components/schemas/PaymentMethod'
        totalInCents:
          type: integer
        transactionCount:
          type: integer

    SalesTrendItem:
      type: object
      required: [date, totalInCents]
      properties:
        date:
          type: string
          format: date
          example: '2026-03-10'
        totalInCents:
          type: integer

    # ── Dashboard ───────────────────────────────────────
    DashboardSummary:
      type: object
      required: [dailyRevenue, averageTicket, orderCount]
      properties:
        dailyRevenue:
          $ref: '#/components/schemas/SummaryMetric'
        averageTicket:
          $ref: '#/components/schemas/SummaryMetric'
        orderCount:
          type: object
          required: [value, changePercent]
          properties:
            value:
              type: integer
              example: 68
            changePercent:
              type: number
              example: -3.1

    SummaryMetric:
      type: object
      required: [valueInCents, changePercent]
      properties:
        valueInCents:
          type: integer
          example: 324000
        changePercent:
          type: number
          example: 12.5

    # ── Error ───────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string
          example: Credenciais inválidas
